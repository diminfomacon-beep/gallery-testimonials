<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: transparent; margin: 0; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 15px;
    }
    .gallery-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    .gallery-card h3 { font-size: 1.1rem; margin-bottom: 10px; color: #333; }
    .gallery-card img, .gallery-card video {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
    .filter-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      padding: 10px;
    }
    .filter-buttons button {
      padding: 8px 16px;
      border: 1px solid #007bff;
      background: white;
      color: #007bff;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .filter-buttons button.active {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="filter-buttons" id="filter-buttons"></div>
  <div id="gallery-container" class="gallery-grid"></div>

  <script>
    // FIXED: Added commas between objects and added type checks
    const items = [
       //{ title: 'Tumbler Design 1', category: 'Tumblers', type: 'image', src: 'https://via.placeholder.com/300x200' },

     // { title: 'Custom Mug', category: 'Mugs', type: 'image', src: 'https://via.placeholder.com/300x200' },
      { 
        title: 'Big Swig with matching Key Chain', 
        category: 'Videos', 
        type: 'video', 
        src: 'https://github.com/diminfomacon-beep/gallery-testimonials/raw/main/custom-gallery/images/Big%20Swig%20One%20Piece.mp4' 
      },
      { 
        title: 'Holographic Ombre Grippy Mint', 
        category: 'Videos', 
        type: 'video', 
        src: 'https://github.com/diminfomacon-beep/gallery-testimonials/raw/main/custom-gallery/images/Holo%20Green%2030oz%20flowers.mp4' 
      },
      { 
        title: 'Holographic Ombre Grippy Purple', 
        category: 'Videos', 
        type: 'video', 
        src: 'https://github.com/diminfomacon-beep/gallery-testimonials/raw/main/custom-gallery/images/Nurse%20holo%20purple.mp4' 
      }
    ];

    const categories = ['All', ...new Set(items.map(i => i.category))];
    const filterButtonsContainer = document.getElementById('filter-buttons');
    const galleryContainer = document.getElementById('gallery-container');

    function renderGallery(category) {
      galleryContainer.innerHTML = '';
      items.forEach(item => {
        if(category !== 'All' && item.category !== category) return;
        
        const card = document.createElement('div');
        card.className = 'gallery-card';
        
       let mediaHtml = '';

      if (item.type === 'video') {
  // autoplay: starts immediately
  // muted: REQUIRED for autoplay to work in Chrome/Safari
  // loop: starts over when finished
  // playsinline: keeps it from opening fullscreen on iPhones
      mediaHtml = `
        <video 
          src="${item.src}" 
          autoplay 
          muted 
          loop 
          playsinline 
          style="width:100%; border-radius:10px;">
        </video>`;
    } else {
      mediaHtml = `<img src="${item.src}" alt="${item.title}" style="width:100%; border-radius:10px;">`;
    }

        card.innerHTML = `<h3>${item.title}</h3>${mediaHtml}`;
        galleryContainer.appendChild(card);
      });
    }

    // Create Buttons
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(cat);
      };
      filterButtonsContainer.appendChild(btn);
    });

    // Default View
    filterButtonsContainer.querySelector('button').classList.add('active');
    renderGallery('All');
  </script>
</body>
</html>
