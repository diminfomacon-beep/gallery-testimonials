<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="gallery-header">
    <h1>Our Custom Work</h1>
    <p>Browse some of our favorite creations</p>
  </section>

  <div class="filter-buttons">
    <button data-filter="all">All</button>
    <button data-filter="shirts">Shirts</button>
    <button data-filter="tumblers">Tumblers</button>
    <button data-filter="baby">Baby Gifts</button>
    <button data-filter="memorial">Memorial</button>
    <button data-filter="seasonal">Seasonal</button>
  </div>

  <div class="gallery-grid">

    <div class="gallery-item shirts">
      <img src="images/shirt1.jpg" alt="Custom Shirt">
    </div>

    <div class="gallery-item tumblers">
      <img src="images/tumbler1.jpg" alt="Custom Tumbler">
    </div>

    <div class="gallery-item memorial">
      <video controls>
        <source src="videos/memorial-video.mp4" type="video/mp4">
      </video>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
