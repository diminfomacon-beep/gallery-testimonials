<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
    }
    .testimonial-header {
      text-align: center;
      padding: 40px 20px;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .review-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .review-card img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
    .stars {
      color: gold;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <section class="testimonial-header">
    <h1>Customer Reviews</h1>
    <div id="average-rating-container" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
    <p>See what our customers are saying</p>
  </section>

  <div id="reviews-container" class="reviews-grid"></div>

  <script>
    // Replace this with your published CSV link from Google Sheets
    // Paste your /exec URL from Step 2 here
const scriptUrl = 'https://script.google.com/macros/s/AKfycbwtIwnBniie6Ke5Hu0O5NQjHIZQh0VaZDBq9KpPQlhNgJiY233R-XP2-WvDqY5dwzbCyQ/exec';

async function fetchReviews() {
  try {
    const response = await fetch(scriptUrl);
    const reviews = await response.json();
    const container = document.getElementById('reviews-container');
    const avgContainer = document.getElementById('average-rating-container');
    
    container.innerHTML = ''; 

    if (reviews.length > 0) {
      // --- LOGIC FOR AVERAGE RATING ---
      const totalRating = reviews.reduce((sum, review) => sum + (parseInt(review.rating) || 0), 0);
      const average = (totalRating / reviews.length).toFixed(1); // e.g., 4.8
      
      // Create the Star display for the average
      const fullStars = Math.floor(average);
      const halfStar = average % 1 >= 0.5 ? '½' : '';
      
      avgContainer.innerHTML = `
        <strong style="font-size: 2rem;">${average}</strong> 
        <span style="color: gold;">${'★'.repeat(fullStars)}${halfStar}</span>
        <div style="font-size: 0.9rem; color: #666;">Based on ${reviews.length} reviews</div>
      `;
      // --------------------------------

      reviews.forEach(review => {
        const card = document.createElement('div');
        card.className = 'review-card';
        const rating = parseInt(review.rating) || 5;

        card.innerHTML = `
          <h3>${review.name || 'Anonymous'}</h3>
          <div class="stars">${'★'.repeat(rating)}</div>
          <p>${review.comment || ''}</p>
          ${review.image ? `<img src="${review.image}" alt="Customer photo" onerror="this.style.display='none'">` : ''}
        `;
        container.appendChild(card);
      });
    } else {
      avgContainer.innerHTML = "No reviews approved yet.";
    }
  } catch (e) {
    console.error("Error:", e);
    document.getElementById('reviews-container').innerHTML = "<p>Error loading reviews.</p>";
  }
}

fetchReviews();
  </script>
</body>
</html>
