<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
    }
    .testimonial-header {
      text-align: center;
      padding: 40px 20px;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .review-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .review-card img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
    .stars {
      color: gold;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <section class="testimonial-header">
    <h1>Customer Reviews</h1>
    <p>See what our customers are saying</p>
  </section>

  <div id="reviews-container" class="reviews-grid"></div>

  <script>
    // Replace this with your published CSV link from Google Sheets
    const csvUrl = 'https://script.google.com/macros/s/AKfycbyBgMlvtYRp2LeFuQ9ERoB8v3AEZcKoNoy8kg56N9c7wIFa283aPUYnmIY2ENZi8W7QSA/exec';

    async function fetchReviews() {
      const response = await fetch(csvUrl);
      const text = await response.text();
      const rows = text.split('\\n').map(r => r.split(','));
      const headers = rows.shift();

      const reviews = rows.map(row => {
        let obj = {};
        headers.forEach((h, i) => {
          obj[h.trim()] = row[i] ? row[i].trim() : '';
        });
        return obj;
      });

      const container = document.getElementById('reviews-container');
      reviews.forEach(review => {
        const card = document.createElement('div');
        card.className = 'review-card';
        card.innerHTML = `
          <h3>${review.Name || 'Anonymous'}</h3>
          <div class="stars">${'★'.repeat(parseInt(review.Rating || 5))}</div>
          <p>${review.Comment || ''}</p>
          ${review.Image ? `<img src="${review.Image}" alt="Customer photo">` : ''}
        `;
        container.appendChild(card);
      });
    }

    fetchReviews();
  </script>
</body>
</html>
