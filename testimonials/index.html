<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
    }
    .testimonial-header {
      text-align: center;
      padding: 40px 20px;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .review-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .review-card img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
    .stars {
      color: gold;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <section class="testimonial-header">
    <h1>Customer Reviews</h1>
    <p>See what our customers are saying</p>
  </section>

  <div id="reviews-container" class="reviews-grid"></div>

  <script>
    // Replace this with your published CSV link from Google Sheets
    // Paste your /exec URL from Step 2 here
const scriptUrl = 'https://script.google.com/macros/s/AKfycbwfqZey-H_696dvGWQ97jdQfIC5Rbg1fR09TRCX3lb0I7P5nQtPg2f26UL5IpTGDrJzAw/exec';

async function fetchReviews() {
  try {
    const response = await fetch(scriptUrl);
    const reviews = await response.json();
    const container = document.getElementById('reviews-container');
    
    container.innerHTML = ''; // Clears the screen

    reviews.forEach(review => {
      const card = document.createElement('div');
      card.className = 'review-card';
      const rating = parseInt(review.rating) || 5;

      card.innerHTML = `
        <h3>${review.name || 'Anonymous'}</h3>
        <div class="stars">${'★'.repeat(rating)}</div>
        <p>${review.comment || ''}</p>
        ${review.image ? `<img src="${review.image}" alt="Customer photo">` : ''}
      `;
      container.appendChild(card);
    });
  } catch (e) {
    console.error("Error:", e);
  }
}

fetchReviews();
  </script>
</body>
</html>
